<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Piano Kit</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="keys">
      <div data-key="65" class="key">
        <kbd>A</kbd>
        <span class="sound"> Clap </span>
      </div>
      <div data-key="83" class="key">
        <kbd>S</kbd>
        <span class="sound"> hihat </span>
      </div>
      <div data-key="68" class="key">
        <kbd>D</kbd>
        <span class="sound"> kick </span>
      </div>
      <div data-key="70" class="key">
        <kbd>F</kbd>
        <span class="sound"> openhat </span>
      </div>
      <div data-key="71" class="key">
        <kbd>G</kbd>
        <span class="sound"> boom </span>
      </div>
      <div data-key="72" class="key">
        <kbd>H</kbd>
        <span class="sound"> ride </span>
      </div>
      <div data-key="74" class="key">
        <kbd>J</kbd>
        <span class="sound"> snare </span>
      </div>
    </div>

    <audio data-key="65" src="./sounds/p1.mp3"></audio>
    <audio data-key="83" src="./sounds/p2.mp3"></audio>
    <audio data-key="68" src="./sounds/p3.mp3"></audio>
    <audio data-key="70" src="./sounds/p4.mp3"></audio>
    <audio data-key="71" src="./sounds/p5.mp3"></audio>
    <audio data-key="72" src="./sounds/p6.mp3"></audio>
    <audio data-key="74" src="./sounds/p7.mp3"></audio>

    <script>
      function playAudio(e) {
        // Select the Specific audio & key element using keyCode
        const audio = document.querySelector(`audio[data-key="${e.keyCode}"]`);
        const key = document.querySelector(`.key[data-key="${e.keyCode}"]`);

        // if no keycode for audio
        if (!audio) return;

        // rewind to start
        audio.currentTime = 0;

        // play sound attached with audio
        audio.play();

        // add classname
        key.classList.add("playing");
      }

      window.addEventListener("keydown", playAudio);

      
      function removeTransition(e) {
            // CHECK IF TRNASFORM IS THERE
            if(e.propertyName !== 'transform') return;

            // IF TRANSITION TRIGGERED REMOVE CLASS
            this.classList.remove('playing');
            
      }

    //   select ALL KEYS
      const keys = document.querySelectorAll('.key');

      //   listen to transitionEnd event
      keys.forEach((key) => key.addEventListener('transitionend', removeTransition));
    </script>
  </body>
</html>
