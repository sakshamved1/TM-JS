<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"> -->

    <style>
        body{
            margin-top: 70px;
            background: #333;
            color: #fff;
        }
    </style>

</head>
<body>
    
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h1 class="display-4 text-center mb-4">Weight converter</h1>
            </div>

            <form>
                <div class="form-group">
                    
                    <input type="number"
                    id="lbsInput"
                    class="form-control form-control-lg"
                    placeholder="Enter Pounds....">   
                </div>
            </form>

            <div id="output">
                <div class="card">
                    <div class="card-block bg-primary">
                        <h4>Grams</h4>
                        <div id="gramsOutput">

                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-block bg-success">
                        <h4>KiloGrams</h4>
                        <div id="kgOutput">

                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-block bg-danger">
                        <h4>Ounces:</h4>
                        <div id="ouncesOutput">

                        </div>
                    </div>
                </div>
                
            </div>
        </div>

    </div>


    <script>
        document.getElementById('output').style.visibility
         = 'hidden';
        document.getElementById('lbsInput').addEventListener('input', (e) => {

            document.getElementById('output').style.visibility
         = 'visible';

            const pounds = e.target.value;

            const Grams = pounds * 453.592;

            const kilograms = pounds * 0.453592;

            const ounces = pounds * 16;


            document.getElementById('gramsOutput').innerHTML = Grams;
            document.getElementById('kgOutput').innerHTML = kilograms;
            document.getElementById('ouncesOutput').innerHTML = ounces;



            
        })
    </script>

</body>
</html>
